<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kineograph - A modern 3D flipbook application with multi-format document support">
<meta property="og:title" content="Kineograph Flipbook">
<meta property="og:description" content="Realistic 3D page-turning flipbook experience with PPT, DOC, ODT support">
<title>Kineograph — 3D Flipbook (Multi-Format)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════
   KINEOGRAPH FLIPBOOK — CSS Architecture (Enhanced)
   ═══════════════════════════════════════════════════════════ */

:root {
  --ink: #0f0c08;
  --paper: #f5f0e8;
  --paper-dark: #e8e0d0;
  --aged: #c8b89a;
  --sepia: #8b6914;
  --accent: #c0392b;
  --accent-soft: rgba(192,57,43,0.12);
  --ui-bg: rgba(15,12,8,0.92);
  --ui-border: rgba(200,184,154,0.2);
  --ui-text: #c8b89a;
  --shadow-book: 0 30px 80px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.4);
  --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
  --transition-med: 0.3s cubic-bezier(0.4,0,0.2,1);
  --page-turn: 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--ink);
  overflow: hidden;
  color: var(--paper);
}

/* ── BACKGROUND ── */
#bg-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  opacity: 0.4;
}

/* ── LAYOUT ── */
#app {
  position: relative;
  width: 100%; height: 100vh;
  display: flex;
  flex-direction: column;
  z-index: 1;
}

/* ── TOP BAR ── */
#topbar {
  height: 52px;
  background: var(--ui-bg);
  border-bottom: 1px solid var(--ui-border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  backdrop-filter: blur(20px);
  flex-shrink: 0;
  z-index: 100;
}

.brand {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--paper);
  text-transform: uppercase;
  margin-right: 8px;
  white-space: nowrap;
}
.brand em {
  color: var(--accent);
  font-style: normal;
}

.topbar-sep {
  width: 1px; height: 24px;
  background: var(--ui-border);
  flex-shrink: 0;
}

.topbar-btn {
  height: 32px;
  padding: 0 12px;
  background: transparent;
  border: 1px solid var(--ui-border);
  border-radius: 4px;
  color: var(--ui-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: var(--transition-fast);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.topbar-btn:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--paper);
}
.topbar-btn.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.topbar-btn svg { flex-shrink: 0; }

.topbar-spacer { flex: 1; }

/* ── MAIN STAGE ── */
#stage {
  flex: 1;
  display: flex;
  position: relative;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 220px;
  background: var(--ui-bg);
  border-right: 1px solid var(--ui-border);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width var(--transition-med);
  flex-shrink: 0;
  z-index: 50;
}
#sidebar.collapsed { width: 0; }

#sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--ui-border);
  flex-shrink: 0;
}
.sidebar-tab {
  flex: 1;
  height: 40px;
  background: transparent;
  border: none;
  color: var(--ui-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: var(--transition-fast);
  text-transform: uppercase;
}
.sidebar-tab.active {
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
}
.sidebar-tab:hover { color: var(--paper); }

#sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }
#sidebar-content::-webkit-scrollbar { width: 4px; }
#sidebar-content::-webkit-scrollbar-track { background: transparent; }
#sidebar-content::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 2px; }

/* Thumbnails */
.thumb-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.thumb-item {
  aspect-ratio: 3/4;
  background: var(--paper-dark);
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  border: 2px solid transparent;
  transition: var(--transition-fast);
  position: relative;
}
.thumb-item:hover { border-color: var(--aged); }
.thumb-item.active { border-color: var(--accent); }
.thumb-item canvas { width: 100%; height: 100%; display: block; }
.thumb-num {
  position: absolute;
  bottom: 4px; left: 0; right: 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ink);
  background: rgba(255,255,255,0.6);
  padding: 1px 0;
}

/* Bookmarks */
.bookmark-item {
  padding: 8px;
  border-bottom: 1px solid var(--ui-border);
  cursor: pointer;
  transition: var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 8px;
}
.bookmark-item:hover { background: var(--accent-soft); }
.bookmark-item .bm-page {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  flex-shrink: 0;
}
.bookmark-item .bm-label { font-size: 13px; color: var(--ui-text); }

/* Search Panel */
.search-panel { padding: 8px 0; }
.search-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--ui-border);
  border-radius: 4px;
  padding: 8px;
  color: var(--paper);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
  transition: var(--transition-fast);
  margin-bottom: 8px;
}
.search-input:focus { border-color: var(--accent); }
.search-results { font-size: 12px; color: var(--ui-text); }

/* ── BOOK VIEWPORT ── */
#book-viewport {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ── BOOK CONTAINER ── */
#book-container {
  position: relative;
  transform-origin: center center;
  transition: transform var(--transition-med);
}

/* 3D BOOK */
#book {
  position: relative;
  perspective: 2000px;
  cursor: pointer;
}

.book-inner {
  position: relative;
  transform-style: preserve-3d;
}

/* ── PAGE STRUCTURE ── */
.page-spread {
  display: flex;
  position: relative;
}

.book-shadow {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 20px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.5) 0%, transparent 70%);
  filter: blur(8px);
  pointer-events: none;
}

/* Individual page half */
.page-half {
  width: var(--page-w, 350px);
  height: var(--page-h, 490px);
  position: relative;
  overflow: hidden;
  background: var(--paper);
  box-shadow: inset -2px 0 8px rgba(0,0,0,0.08);
}

.page-half.left {
  border-radius: 4px 0 0 4px;
  box-shadow: inset -4px 0 12px rgba(0,0,0,0.15), -4px 0 20px rgba(0,0,0,0.3);
}
.page-half.right {
  border-radius: 0 4px 4px 0;
  box-shadow: inset 4px 0 12px rgba(0,0,0,0.15), 4px 0 20px rgba(0,0,0,0.3);
}

/* Page spine crease */
.page-half.left::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(to left, rgba(0,0,0,0.12) 0%, transparent 100%);
  pointer-events: none;
}
.page-half.right::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(to right, rgba(0,0,0,0.12) 0%, transparent 100%);
  pointer-events: none;
  z-index: 1;
}

/* Page canvas */
.page-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ── PAGE FLIP ANIMATION ── */
.flip-wrapper {
  position: absolute;
  top: 0;
  width: var(--page-w, 350px);
  height: var(--page-h, 490px);
  transform-origin: left center;
  transform-style: preserve-3d;
  z-index: 10;
}

.flip-wrapper.flip-left {
  left: 0;
  transform-origin: right center;
}
.flip-wrapper.flip-right {
  right: 0;
  transform-origin: left center;
}

.flip-front, .flip-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  background: var(--paper);
  overflow: hidden;
}

.flip-back {
  transform: rotateY(180deg);
  background: var(--paper);
}

/* Page turning shadow gradient */
.flip-shadow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

/* ── PAGE CURL HOVER EFFECT ── */
.corner-curl {
  position: absolute;
  bottom: 0;
  width: 60px;
  height: 60px;
  cursor: pointer;
  z-index: 20;
  overflow: hidden;
  transition: var(--transition-med);
}
.corner-curl.right { right: 0; border-radius: 0 0 4px 0; }
.corner-curl.left { left: 0; border-radius: 0 0 0 4px; }

.corner-curl::before {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 0 40px 40px;
  border-color: transparent transparent var(--aged) transparent;
  transition: border-width var(--transition-med);
  filter: drop-shadow(-2px -2px 4px rgba(0,0,0,0.2));
}
.corner-curl.right::before { border-bottom-color: var(--aged); }
.corner-curl:hover::before { border-width: 0 0 60px 60px; }

.corner-curl.left::before {
  right: auto; left: 0;
  border-width: 0 40px 40px 0;
  border-color: transparent var(--aged) transparent transparent;
}
.corner-curl.left:hover::before { border-width: 0 60px 60px 0; }

/* Page number overlay */
.page-num-overlay {
  position: absolute;
  bottom: 12px;
  width: 100%;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(139,105,20,0.6);
  letter-spacing: 0.1em;
  pointer-events: none;
  z-index: 5;
}

/* ── SINGLE PAGE MODE ── */
#book.single-mode .page-spread { justify-content: center; }
#book.single-mode .page-half.left { display: none; }

/* ── ANNOTATION CANVAS ── */
.annotation-layer {
  position: absolute;
  inset: 0;
  z-index: 15;
  cursor: crosshair;
  pointer-events: none;
}
.annotation-layer.active { pointer-events: all; }

/* ── CONTROLS BAR ── */
#controls {
  height: 56px;
  background: var(--ui-bg);
  border-top: 1px solid var(--ui-border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  backdrop-filter: blur(20px);
  padding: 0 16px;
  flex-shrink: 0;
  z-index: 100;
}

.ctrl-btn {
  width: 36px; height: 36px;
  background: transparent;
  border: 1px solid var(--ui-border);
  border-radius: 6px;
  color: var(--ui-text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-fast);
  flex-shrink: 0;
}
.ctrl-btn:hover:not(:disabled) {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--paper);
}
.ctrl-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.ctrl-btn.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

.ctrl-sep {
  width: 1px; height: 28px;
  background: var(--ui-border);
  flex-shrink: 0;
}

.page-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ui-text);
}
.page-input {
  width: 48px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--ui-border);
  border-radius: 4px;
  color: var(--paper);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-align: center;
  padding: 4px;
  outline: none;
}
.page-input:focus { border-color: var(--accent); }

/* ── ZOOM INDICATOR ── */
#zoom-indicator {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ui-text);
  backdrop-filter: blur(10px);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
#zoom-indicator.visible { opacity: 1; }

/* ── ANNOTATION TOOLBAR ── */
#annotation-toolbar {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 8px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(20px);
  z-index: 200;
  display: none;
}
#annotation-toolbar.visible { display: flex; }

.ann-tool {
  width: 32px; height: 32px;
  background: transparent;
  border: 1px solid var(--ui-border);
  border-radius: 4px;
  color: var(--ui-text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-fast);
  font-size: 14px;
}
.ann-tool:hover, .ann-tool.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--paper);
}

.ann-color-btn {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--ui-border);
  cursor: pointer;
  transition: var(--transition-fast);
}
.ann-color-btn:hover { transform: scale(1.2); }

#color-picker-input {
  width: 0; height: 0;
  opacity: 0;
  position: absolute;
}

.ann-size-slider {
  -webkit-appearance: none;
  width: 60px; height: 4px;
  background: var(--ui-border);
  border-radius: 2px;
  outline: none;
}
.ann-size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}

/* ── STICKY NOTE ── */
.sticky-note {
  position: absolute;
  background: #fef08a;
  color: #1c1917;
  padding: 8px;
  border-radius: 2px;
  min-width: 120px;
  min-height: 80px;
  box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
  cursor: move;
  z-index: 30;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  resize: both;
  overflow: auto;
}
.sticky-note textarea {
  width: 100%; height: 100%;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  min-height: 60px;
}
.sticky-note .note-close {
  position: absolute;
  top: 2px; right: 4px;
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(0,0,0,0.4);
  font-size: 14px;
  line-height: 1;
}

/* ── LOADING OVERLAY ── */
#loading {
  position: absolute;
  inset: 0;
  background: var(--ui-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(20px);
  transition: opacity 0.5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }

.loading-logo {
  font-size: 48px;
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--paper);
  margin-bottom: 8px;
}
.loading-logo em { color: var(--accent); font-style: normal; }
.loading-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--aged);
  margin-bottom: 40px;
  text-transform: uppercase;
}

.loading-bar-wrap {
  width: 200px;
  height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 1px;
  overflow: hidden;
  margin-bottom: 16px;
}
.loading-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.3s;
}

.loading-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--aged);
  letter-spacing: 0.1em;
}

/* Drop zone */
#dropzone {
  position: absolute;
  inset: 0;
  border: 3px dashed var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: rgba(192,57,43,0.05);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 500;
}
#dropzone.active { opacity: 1; }
.dz-text {
  font-size: 24px;
  color: var(--accent);
  font-weight: 300;
  letter-spacing: 0.1em;
}
.dz-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--aged);
}

/* ── UPLOAD PANEL ── */
#upload-panel {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  z-index: 50;
}
.upload-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--ui-border);
  border-radius: 16px;
  padding: 48px 64px;
  text-align: center;
  max-width: 480px;
  width: 90%;
}
.upload-title {
  font-size: 32px;
  font-weight: 300;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.upload-title em { color: var(--accent); font-style: normal; }
.upload-desc {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--aged);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.upload-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.upload-btn {
  padding: 12px 24px;
  background: transparent;
  border: 1px solid var(--ui-border);
  border-radius: 6px;
  color: var(--ui-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 8px;
}
.upload-btn:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--paper);
}
.upload-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.upload-btn.primary:hover { background: #a93226; }
.upload-divider {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--aged);
  letter-spacing: 0.2em;
  margin-top: 24px;
}

/* ── TOAST ── */
#toast-container {
  position: fixed;
  bottom: 80px;
  right: 16px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 6px;
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--paper);
  backdrop-filter: blur(20px);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  max-width: 300px;
}
.toast.success { border-color: #16a34a; }
.toast.error { border-color: var(--accent); }
@keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform: translateX(20px); } }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #1a1610;
  border: 1px solid var(--ui-border);
  border-radius: 12px;
  padding: 32px;
  max-width: 500px;
  width: 90%;
  transform: translateY(20px);
  transition: transform 0.3s;
}

<script>
